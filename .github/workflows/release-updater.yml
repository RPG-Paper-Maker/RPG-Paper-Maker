name: Release Updater

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version (e.g. 3.0.52)'
                required: true
                type: string

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-mac:
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v5

            - name: Set updater/version
              run: echo -n "updater/${{ inputs.version }}" > updater/version

            - name: Download Electron x64 and arm64
              run: |
                  V=40.6.1
                  curl -fL "https://github.com/electron/electron/releases/download/v${V}/electron-v${V}-darwin-x64.zip"   -o electron-x64.zip
                  curl -fL "https://github.com/electron/electron/releases/download/v${V}/electron-v${V}-darwin-arm64.zip" -o electron-arm64.zip
                  unzip -q electron-x64.zip   -d electron-x64
                  unzip -q electron-arm64.zip -d electron-arm64

            - name: Inject app into both builds
              run: |
                  for ARCH in x64 arm64; do
                    RESOURCES="electron-${ARCH}/Electron.app/Contents/Resources"
                    rm -f "${RESOURCES}/default_app.asar"
                    mkdir -p "${RESOURCES}/app"
                    cp main.js package.json preload.js "${RESOURCES}/app/"
                    cp -r updater "${RESOURCES}/app/updater"
                    mkdir "${RESOURCES}/app/DLCs"
                  done

            - name: Install @electron/universal
              run: npm install --no-save @electron/universal

            - name: Create universal .app
              run: |
                  node -e "
                    const path = require('path');
                    const { makeUniversalApp } = require('@electron/universal');
                    const cwd = process.cwd();
                    makeUniversalApp({
                      x64AppPath:  path.join(cwd, 'electron-x64/Electron.app'),
                      arm64AppPath: path.join(cwd, 'electron-arm64/Electron.app'),
                      outAppPath:  path.join(cwd, 'RPG-Paper-Maker.app'),
                    }).then(() => console.log('Done')).catch(e => { console.error(e); process.exit(1); });
                  "

            - name: Rename executable and update Info.plist
              run: |
                  mv "RPG-Paper-Maker.app/Contents/MacOS/Electron" "RPG-Paper-Maker.app/Contents/MacOS/RPG Paper Maker"
                  cp public/icon.icns "RPG-Paper-Maker.app/Contents/Resources/electron.icns"
                  PLIST="RPG-Paper-Maker.app/Contents/Info.plist"
                  /usr/libexec/PlistBuddy -c "Delete :CFBundleExecutableName" "$PLIST" 2>/dev/null || true
                  /usr/libexec/PlistBuddy -c "Add :CFBundleExecutableName string RPG Paper Maker" "$PLIST"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleName RPG Paper Maker" "$PLIST"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName RPG Paper Maker" "$PLIST"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile electron.icns" "$PLIST"
                  mv "RPG-Paper-Maker.app" "RPG Paper Maker.app"

            - name: Ad-hoc sign
              run: codesign --deep --force --sign - "RPG Paper Maker.app"

            - name: Package
              run: |
                  mkdir "RPG Paper Maker"
                  cp -r "RPG Paper Maker.app" "RPG Paper Maker/"
                  zip -ry RPG.Paper.Maker.Mac.zip "RPG Paper Maker"

            - name: Upload to release
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}
              run: |
                  TAG="updater/${{ inputs.version }}"
                  if gh release view "$TAG" --repo RPG-Paper-Maker/RPG-Paper-Maker > /dev/null 2>&1; then
                    gh release upload "$TAG" RPG.Paper.Maker.Mac.zip --clobber --repo RPG-Paper-Maker/RPG-Paper-Maker
                  else
                    gh release create "$TAG" RPG.Paper.Maker.Mac.zip \
                      --title "Updater ${{ inputs.version }}" \
                      --no-latest \
                      --repo RPG-Paper-Maker/RPG-Paper-Maker
                  fi

            - name: Upload artifact for Steam deploy
              uses: actions/upload-artifact@v4
              with:
                  name: mac-build
                  path: RPG.Paper.Maker.Mac.zip
                  retention-days: 1

    build-win:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v5

            - name: Get Electron version
              id: electron
              shell: bash
              run: |
                  VERSION=$(node -p "require('./package.json').devDependencies.electron.replace(/[\^~>=<]*/g, '')")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Set updater/version
              shell: bash
              run: echo -n "updater/${{ inputs.version }}" > updater/version

            - name: Download Electron x64
              shell: bash
              run: |
                  V=${{ steps.electron.outputs.version }}
                  curl -fL "https://github.com/electron/electron/releases/download/v${V}/electron-v${V}-win32-x64.zip" -o electron-x64.zip
                  unzip -q electron-x64.zip -d electron-x64

            - name: Inject app
              shell: bash
              run: |
                  RESOURCES="electron-x64/resources"
                  rm -f "${RESOURCES}/default_app.asar"
                  mkdir -p "${RESOURCES}/app"
                  cp main.js package.json preload.js "${RESOURCES}/app/"
                  cp -r updater "${RESOURCES}/app/updater"
                  mkdir "${RESOURCES}/app/DLCs"

            - name: Rename executable
              shell: bash
              run: mv "electron-x64/electron.exe" "electron-x64/RPG Paper Maker.exe"

            - name: Set icon
              shell: bash
              run: |
                  curl -fL "https://github.com/electron/rcedit/releases/latest/download/rcedit-x64.exe" -o rcedit.exe
                  ./rcedit.exe "electron-x64/RPG Paper Maker.exe" --set-icon public/favicon.ico

            - name: Package zip
              shell: pwsh
              run: |
                  Copy-Item -Recurse electron-x64 "RPG Paper Maker"
                  Compress-Archive -Path "RPG Paper Maker" -DestinationPath RPG.Paper.Maker.Windows.zip

            - name: Build installer
              shell: cmd
              run: iscc /DMyAppVersion=${{ inputs.version }} "/DSourceDir=${{ github.workspace }}\electron-x64" installer\install.iss

            - name: Upload to release
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}
              shell: bash
              run: |
                  TAG="updater/${{ inputs.version }}"
                  if gh release view "$TAG" --repo RPG-Paper-Maker/RPG-Paper-Maker > /dev/null 2>&1; then
                    gh release upload "$TAG" RPG.Paper.Maker.Windows.zip installer-output/RPG.Paper.Maker.Installer.exe --clobber --repo RPG-Paper-Maker/RPG-Paper-Maker
                  else
                    gh release create "$TAG" RPG.Paper.Maker.Windows.zip installer-output/RPG.Paper.Maker.Installer.exe \
                      --title "Updater ${{ inputs.version }}" \
                      --no-latest \
                      --repo RPG-Paper-Maker/RPG-Paper-Maker
                  fi

            - name: Upload artifact for Steam deploy
              uses: actions/upload-artifact@v4
              with:
                  name: win-build
                  path: RPG.Paper.Maker.Windows.zip
                  retention-days: 1

    build-linux:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Get Electron version
              id: electron
              run: |
                  VERSION=$(node -p "require('./package.json').devDependencies.electron.replace(/[\^~>=<]*/g, '')")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Set updater/version
              run: echo -n "updater/${{ inputs.version }}" > updater/version

            - name: Download Electron x64
              run: |
                  V=${{ steps.electron.outputs.version }}
                  curl -fL "https://github.com/electron/electron/releases/download/v${V}/electron-v${V}-linux-x64.zip" -o electron-x64.zip
                  unzip -q electron-x64.zip -d electron-x64

            - name: Inject app
              run: |
                  RESOURCES="electron-x64/resources"
                  rm -f "${RESOURCES}/default_app.asar"
                  mkdir -p "${RESOURCES}/app"
                  cp main.js package.json preload.js "${RESOURCES}/app/"
                  cp -r updater "${RESOURCES}/app/updater"
                  mkdir "${RESOURCES}/app/DLCs"

            - name: Package
              run: |
                  mv "electron-x64/electron" "electron-x64/RPG Paper Maker"
                  printf '#!/bin/bash\nDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\nexec "$DIR/RPG Paper Maker" --no-sandbox "$@"\n' > "electron-x64/launch.sh"
                  chmod +x "electron-x64/launch.sh"
                  mv electron-x64 "RPG Paper Maker"
                  zip -ry RPG.Paper.Maker.Linux.zip "RPG Paper Maker"

            - name: Upload to release
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}
              run: |
                  TAG="updater/${{ inputs.version }}"
                  if gh release view "$TAG" --repo RPG-Paper-Maker/RPG-Paper-Maker > /dev/null 2>&1; then
                    gh release upload "$TAG" RPG.Paper.Maker.Linux.zip --clobber --repo RPG-Paper-Maker/RPG-Paper-Maker
                  else
                    gh release create "$TAG" RPG.Paper.Maker.Linux.zip \
                      --title "Updater ${{ inputs.version }}" \
                      --no-latest \
                      --repo RPG-Paper-Maker/RPG-Paper-Maker
                  fi

            - name: Upload artifact for Steam deploy
              uses: actions/upload-artifact@v4
              with:
                  name: linux-build
                  path: RPG.Paper.Maker.Linux.zip
                  retention-days: 1

    deploy-steam:
        needs: [build-mac, build-win, build-linux]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Download Mac build
              uses: actions/download-artifact@v4
              with:
                  name: mac-build
                  path: artifacts/

            - name: Download Windows build
              uses: actions/download-artifact@v4
              with:
                  name: win-build
                  path: artifacts/

            - name: Download Linux build
              uses: actions/download-artifact@v4
              with:
                  name: linux-build
                  path: artifacts/

            - name: Extract builds into Steam content folders
              run: |
                  mkdir -p content/linux content/windows content/mac
                  unzip -q "artifacts/RPG.Paper.Maker.Linux.zip" -d content/linux_tmp/
                  mv "content/linux_tmp/RPG Paper Maker/"* content/linux/
                  unzip -q "artifacts/RPG.Paper.Maker.Windows.zip" -d content/win_tmp/
                  mv "content/win_tmp/RPG Paper Maker/"* content/windows/
                  unzip -q "artifacts/RPG.Paper.Maker.Mac.zip" -d content/mac_tmp/
                  mv "content/mac_tmp/RPG Paper Maker/"* content/mac/

            - name: Install steamcmd
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y lib32gcc-s1
                  mkdir -p ~/steamcmd
                  curl -sqL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar xvzf - -C ~/steamcmd

            - name: Set build description
              run: |
                  sed -i 's/Your build description here/Updater ${{ inputs.version }}/' steam/app_build_1066860.vdf

            - name: Restore Steam config
              run: |
                  mkdir -p ~/Steam/config
                  echo "${{ secrets.STEAM_CONFIG_VDF }}" | base64 -d > ~/Steam/config/config.vdf

            - name: Deploy to Steam
              env:
                  STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
                  STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
              run: |
                  mkdir -p steam-output
                  ~/steamcmd/steamcmd.sh \
                    +login "$STEAM_USERNAME" "$STEAM_PASSWORD" \
                    +run_app_build "${{ github.workspace }}/steam/app_build_1066860.vdf" \
                    +quit
