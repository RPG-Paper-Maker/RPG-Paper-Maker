<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Loading...</title>
		<style>
			img {
				width: 600px;
			}
			p {
				position: absolute;
				left: 20px;
				top: 20px;
				color: black;
				font-weight: bold;
				font-family: 'sans-serif';
				font-size: 20px;
				text-shadow:
					-2px -2px 0 white,
					2px -2px 0 white,
					-2px 2px 0 white,
					2px 2px 0 white,
					0px 2px 0 white,
					2px 0px 0 white,
					-2px 0px 0 white,
					0px -2px 0 white;
			}
		</style>
	</head>
	<body>
		<div>
			<img src="splash.png" alt="App Icon" />
			<p id="title" />
		</div>
		<script>
			const params = new URLSearchParams(window.location.search);
			const title = params.get('title');
			if (title) {
				document.getElementById('title').textContent = title;
			}
		</script>
	</body>
</html>
