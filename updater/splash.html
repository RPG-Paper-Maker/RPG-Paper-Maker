<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Loading...</title>
		<style>
			img {
				width: 600px;
			}
			p {
				position: absolute;
				text-align: center;
				left: 20px;
				top: 20px;
				color: rgb(186, 93, 21);
				font-family: 'Arial Black', Arial, sans-serif;
				font-weight: 900;
				font-size: 45px;
				text-shadow:
					-5px -5px 0 white,
					5px -5px 0 white,
					-5px 5px 0 white,
					5px 5px 0 white,
					0px 5px 0 white,
					5px 0px 0 white,
					-5px 0px 0 white,
					0px -5px 0 white;
			}
		</style>
	</head>
	<body>
		<div>
			<img src="splash.png" alt="App Icon" />
			<p id="title" />
		</div>
		<script>
			const params = new URLSearchParams(window.location.search);
			const title = params.get('title');
			if (title) {
				document.getElementById('title').textContent = title;
			}
		</script>
	</body>
</html>
